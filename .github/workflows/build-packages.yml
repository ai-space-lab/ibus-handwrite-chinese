name: Build packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to upload packages to (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          apt update
          apt install -y dpkg-dev fakeroot python3
      - name: Build .deb
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          bash packaging/build-deb.sh "$VERSION"
      - name: Upload .deb
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ibus-handwrite-chinese_*.deb

  build-rpm:
    name: Build .rpm
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: dnf install -y rpm-build python3 git tar gzip
      - name: Build .rpm
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          bash packaging/build-rpm.sh "$VERSION"
      - name: Upload .rpm
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ibus-handwrite-chinese-*.rpm

  build-source:
    name: Build source tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create source tarball
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          tar --exclude='.git' --exclude='.github' --exclude='__pycache__' \
              --exclude='models' --exclude='*.pyc' \
              -czf "ibus-handwrite-chinese-${VERSION}.tar.gz" \
              src/ xml/ icons/ tools/ docs/ tests/ \
              bootstrap.sh LICENSE \
              README.md README.zh-CN.md README.zh-TW.md \
              packaging/
      - name: Upload source tarball
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ibus-handwrite-chinese-*.tar.gz
