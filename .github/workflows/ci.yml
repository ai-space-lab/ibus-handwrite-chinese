name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt update && sudo apt install -y shellcheck libxml2-utils
      - name: shellcheck
        run: shellcheck -e SC1091 bootstrap.sh tools/install.sh tools/restore.sh
      - name: xmllint
        run: xmllint --noout xml/handwrite-chinese.xml
      - name: Python syntax — engine
        run: python3 -c "compile(open('src/ibus-engine-handwrite-chinese').read(), 'engine', 'exec')"
      - name: Python syntax — evdev reader
        run: python3 -c "compile(open('src/handwrite_evdev.py').read(), 'evdev', 'exec')"

  test-install:
    name: "install deps — ${{ matrix.distro }}"
    runs-on: ubuntu-latest
    container: ${{ matrix.distro }}
    timeout-minutes: 30
    strategy:
      matrix:
        distro: [debian:bookworm, ubuntu:24.04, fedora:latest, archlinux:latest, opensuse/tumbleweed]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Arch
        if: startsWith(matrix.distro, 'arch')
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su builder -c "cd /tmp && git clone https://aur.archlinux.org/yay.git && cd yay && makepkg -si --noconfirm"
      - name: Install deps (Debian/Ubuntu)
        if: startsWith(matrix.distro, 'debian') || startsWith(matrix.distro, 'ubuntu')
        run: |
          apt update
          apt install -y python3-evdev wget unzip
      - name: Install deps (Fedora)
        if: startsWith(matrix.distro, 'fedora')
        run: dnf install -y python3-evdev
      - name: Install deps (Arch)
        if: startsWith(matrix.distro, 'arch')
        run: echo "Arch deps installed via pacman above"
      - name: Install deps (openSUSE)
        if: startsWith(matrix.distro, 'opensuse')
        run: zypper install -y python3-evdev
      - name: Verify Python syntax
        run: |
          python3 -c "compile(open('src/ibus-engine-handwrite-chinese').read(), 'engine', 'exec')"
          python3 -c "compile(open('src/handwrite_evdev.py').read(), 'evdev', 'exec')"

  test-bootstrap:
    name: "bootstrap.sh — ${{ matrix.distro }}"
    runs-on: ubuntu-latest
    container: ${{ matrix.distro }}
    timeout-minutes: 30
    strategy:
      matrix:
        distro: [debian:bookworm, ubuntu:24.04, fedora:latest, archlinux:latest, opensuse/tumbleweed]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Arch
        if: startsWith(matrix.distro, 'arch')
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su builder -c "cd /tmp && git clone https://aur.archlinux.org/yay.git && cd yay && makepkg -si --noconfirm"
      - name: Run bootstrap.sh
        run: bash bootstrap.sh
      - name: Verify installed files
        run: |
          test -f /usr/local/bin/ibus-engine-handwrite-chinese
          test -f /usr/local/bin/handwrite_evdev.py
          test -f /usr/share/ibus/component/handwrite-chinese.xml
          test -f /usr/local/share/ibus-handwrite-chinese/restore.sh
          test -f /usr/local/share/ibus-handwrite-chinese/icons/handwrite-chinese.svg
          test -f /etc/udev/rules.d/99-trackpad-handwrite.rules
      - name: Verify engine Python syntax
        run: python3 -c "compile(open('/usr/local/bin/ibus-engine-handwrite-chinese').read(), 'engine', 'exec')"
      - name: Test recognition with synthetic strokes
        run: python3 tests/test_recognition.py

  test-gtk-write:
    name: "GTK write — ${{ matrix.distro }}"
    runs-on: ubuntu-latest
    container: ${{ matrix.distro }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        distro:
          - debian:11
          - debian:12
          - ubuntu:22.04
          - ubuntu:24.04
          - fedora:40
          - fedora:41
          - fedora:latest
          - archlinux:latest
          - opensuse/leap:latest
          - opensuse/tumbleweed
    steps:
      - uses: actions/checkout@v4
      - name: Setup Arch
        if: startsWith(matrix.distro, 'arch')
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su builder -c "cd /tmp && git clone https://aur.archlinux.org/yay.git && cd yay && makepkg -si --noconfirm"
      - name: Install deps (Debian/Ubuntu)
        if: startsWith(matrix.distro, 'debian') || startsWith(matrix.distro, 'ubuntu')
        run: |
          apt update
          apt install -y python3-evdev python3-gi python3-gi-cairo \
            xvfb wget unzip \
            gir1.2-gtk-3.0 gir1.2-ibus-1.0
          mkdir -p /usr/local/share/ibus-handwrite-chinese/models
      - name: Install deps (Fedora)
        if: startsWith(matrix.distro, 'fedora')
        run: |
          dnf install -y python3-evdev python3-gobject \
            xorg-x11-server-Xvfb wget unzip gtk3 ibus-libs gobject-introspection
          mkdir -p /usr/local/share/ibus-handwrite-chinese/models
      - name: Install deps (Arch)
        if: startsWith(matrix.distro, 'arch')
        run: |
          pacman -S --noconfirm python-evdev python-gobject python-cairo gtk3 ibus xorg-server-xvfb wget unzip
          mkdir -p /usr/local/share/ibus-handwrite-chinese/models
      - name: Install deps (openSUSE)
        if: startsWith(matrix.distro, 'opensuse')
        run: |
          zypper install -y python3-evdev python3-gobject typelib-1_0-Gtk-3_0 \
            typelib-1_0-IBus-1_0 xvfb-run wget unzip
          mkdir -p /usr/local/share/ibus-handwrite-chinese/models
      - name: Ensure pip3 is installed
        run: |
          if ! command -v pip3 &>/dev/null; then
            if command -v apt &>/dev/null; then
              apt update && apt install -y python3-pip
            elif command -v dnf &>/dev/null; then
              dnf install -y python3-pip
            elif command -v pacman &>/dev/null; then
              pacman -S --noconfirm python-pip
            elif command -v zypper &>/dev/null; then
              zypper install -y python3-pip
            fi
          fi
      - name: Download PP-OCRv6 ONNX model
        run: |
          mkdir -p /usr/local/share/ibus-handwrite-chinese/models
          wget -q --timeout=60 -O /usr/local/share/ibus-handwrite-chinese/models/ppocrv6_small_rec.onnx \
            https://huggingface.co/PaddlePaddle/PP-OCRv6_small_rec_onnx/resolve/main/inference.onnx || \
          echo "WARNING: ONNX model download failed"
          wget -q --timeout=60 -O /usr/local/share/ibus-handwrite-chinese/models/dict_v6.txt \
            https://raw.githubusercontent.com/PaddlePaddle/PaddleOCR/main/ppocr/utils/dict/ppocrv6_dict.txt || \
          echo "WARNING: dict download failed"
          ls -la /usr/local/share/ibus-handwrite-chinese/models/
      - name: Install python3-onnxruntime (Debian/Ubuntu)
        if: startsWith(matrix.distro, 'debian') || startsWith(matrix.distro, 'ubuntu')
        run: pip3 install onnxruntime numpy 2>/dev/null || pip3 install --break-system-packages onnxruntime numpy || apt install -y python3-onnxruntime python3-numpy || true
      - name: Install python3-onnxruntime (Fedora)
        if: startsWith(matrix.distro, 'fedora')
        run: pip3 install onnxruntime numpy 2>/dev/null || pip3 install --break-system-packages onnxruntime numpy || dnf install -y python3-onnxruntime python3-numpy || true
      - name: Install python3-onnxruntime (Arch)
        if: startsWith(matrix.distro, 'arch')
        run: pip3 install onnxruntime numpy 2>/dev/null || pip3 install --break-system-packages onnxruntime numpy || pacman -S --noconfirm python-onnxruntime python-numpy || true
      - name: Install python3-onnxruntime (openSUSE)
        if: startsWith(matrix.distro, 'opensuse')
        run: pip3 install onnxruntime numpy 2>/dev/null || pip3 install --break-system-packages onnxruntime numpy || zypper install -y python3-onnxruntime python3-numpy || true
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
      - name: Run GTK write test
        run: python3 tests/test_gtk_write_phrase.py
      - name: Set artifact name
        run: |
          printf 'GTK_ARTIFACT_NAME=%s\n' "gtk-write-screenshots-${{ matrix.distro }}" | tr ':/' '-' >> "$GITHUB_ENV"
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GTK_ARTIFACT_NAME }}
          path: tests/screenshots/
          if-no-files-found: warn
