name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and upload (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve tag
        id: release
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-deb:
    name: Build .deb
    runs-on: ubuntu-latest
    needs: release
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          apt update
          apt install -y dpkg-dev fakeroot python3
      - name: Build .deb
        run: bash packaging/build-deb.sh "${{ needs.release.outputs.version }}"
      - name: Verify .deb installs
        run: |
          apt install -y python3-evdev python3-gi libzinnia0 ibus wget unzip
          dpkg -i ibus-handwrite-chinese_*.deb
          dpkg --audit ibus-handwrite-chinese || true
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: ibus-handwrite-chinese_*.deb
          if-no-files-found: error

  build-rpm:
    name: Build .rpm
    runs-on: ubuntu-latest
    needs: release
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: dnf install -y rpm-build python3 git tar gzip
      - name: Build .rpm
        run: bash packaging/build-rpm.sh "${{ needs.release.outputs.version }}"
      - name: Verify .rpm installs
        run: |
          dnf install -y /tmp/ibus-handwrite-chinese-rpm-build/RPMS/noarch/ibus-handwrite-chinese-*.rpm 2>/dev/null || \
          dnf install -y ibus-handwrite-chinese-*.rpm 2>/dev/null || \
          echo "RPM install check skipped (deps may not be available in minimal container)"
      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: ibus-handwrite-chinese-*.rpm
          if-no-files-found: error

  build-source:
    name: Build source tarball
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - name: Create source tarball
        run: |
          tar --exclude='.git' --exclude='.github' --exclude='__pycache__' \
              --exclude='models' --exclude='*.pyc' \
              -czf "ibus-handwrite-chinese-${{ needs.release.outputs.version }}.tar.gz" \
              src/ xml/ icons/ tools/ docs/ tests/ \
              bootstrap.sh LICENSE \
              README.md README.zh-CN.md README.zh-TW.md \
              packaging/
      - name: Verify source tarball
        run: tar -tzf "ibus-handwrite-chinese-${{ needs.release.outputs.version }}.tar.gz" >/dev/null
      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: ibus-handwrite-chinese-*.tar.gz
          if-no-files-found: error

  verify-release-artifacts:
    name: Verify release artifacts
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm, build-source]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Verify packaged artifacts exist
        run: |
          test -n "$(find release-artifacts -name 'ibus-handwrite-chinese_*.deb' -print -quit)"
          test -n "$(find release-artifacts -name 'ibus-handwrite-chinese-*.rpm' -print -quit)"
          test -n "$(find release-artifacts -name 'ibus-handwrite-chinese-*.tar.gz' -print -quit)"

  upload-release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [release, verify-release-artifacts]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: release-artifacts/*
