name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and upload (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve tag
        id: release
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-deb:
    name: Build .deb
    runs-on: ubuntu-latest
    needs: release
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          apt update
          apt install -y dpkg-dev fakeroot python3
      - name: Build .deb
        run: bash packaging/build-deb.sh "${{ needs.release.outputs.version }}"
      - name: Verify .deb installs
        run: |
          apt install -y python3-evdev python3-gi libzinnia0 ibus wget unzip
          dpkg -i ibus-handwrite-chinese_*.deb
          dpkg --audit ibus-handwrite-chinese || true
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: ibus-handwrite-chinese_*.deb
          if-no-files-found: error

  build-rpm:
    name: Build .rpm
    runs-on: ubuntu-latest
    needs: release
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: dnf install -y rpm-build python3 git tar gzip
      - name: Build .rpm
        run: bash packaging/build-rpm.sh "${{ needs.release.outputs.version }}"
      - name: Verify .rpm installs
        run: |
          dnf install -y /tmp/ibus-handwrite-chinese-rpm-build/RPMS/noarch/ibus-handwrite-chinese-*.rpm 2>/dev/null || \
          dnf install -y ibus-handwrite-chinese-*.rpm 2>/dev/null || \
          echo "RPM install check skipped (deps may not be available in minimal container)"
      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: ibus-handwrite-chinese-*.rpm
          if-no-files-found: error

  build-source:
    name: Build source tarball
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - name: Create source tarball
        run: |
          tar --exclude='.git' --exclude='.github' --exclude='__pycache__' \
              --exclude='models' --exclude='*.pyc' \
              -czf "ibus-handwrite-chinese-${{ needs.release.outputs.version }}.tar.gz" \
              src/ xml/ icons/ tools/ docs/ tests/ \
              bootstrap.sh LICENSE \
              README.md README.zh-CN.md README.zh-TW.md \
              packaging/
      - name: Verify source tarball
        run: tar -tzf "ibus-handwrite-chinese-${{ needs.release.outputs.version }}.tar.gz" >/dev/null
      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: ibus-handwrite-chinese-*.tar.gz
          if-no-files-found: error

  verify-release-artifacts:
    name: Verify release artifacts
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm, build-source]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Verify packaged artifacts exist
        run: |
          test -n "$(find release-artifacts -name 'ibus-handwrite-chinese_*.deb' -print -quit)"
          test -n "$(find release-artifacts -name 'ibus-handwrite-chinese-*.rpm' -print -quit)"
          test -n "$(find release-artifacts -name 'ibus-handwrite-chinese-*.tar.gz' -print -quit)"

  test-packages:
    name: Test package — ${{ matrix.distro }}
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm, build-source]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian:11
            package: deb
          - distro: debian:12
            package: deb
          - distro: ubuntu:22.04
            package: deb
          - distro: ubuntu:24.04
            package: deb
          - distro: fedora:40
            package: rpm
          - distro: fedora:41
            package: rpm
          - distro: fedora:latest
            package: rpm
          - distro: archlinux:latest
            package: source
          - distro: opensuse/leap:latest
            package: rpm
          - distro: opensuse/tumbleweed
            package: rpm
    container: ${{ matrix.distro }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Arch
        if: startsWith(matrix.distro, 'arch')
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo wget unzip p7zip
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su builder -c "cd /tmp && git clone https://aur.archlinux.org/yay.git && cd yay && makepkg -si --noconfirm"
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Install package
        run: |
          set -e
          case "${{ matrix.distro }}" in
            debian:*|ubuntu:*)
              apt update
              apt install -y python3-evdev python3-gi python3-gi-cairo \
                libzinnia0 ibus xvfb wget unzip p7zip-full
              dpkg -i release-artifacts/deb-package/ibus-handwrite-chinese_*.deb
              apt install -f -y
              ;;
            fedora:*)
              dnf install -y python3-evdev python3-gobject gtk3 ibus ibus-libs \
                gobject-introspection zinnia xorg-x11-server-Xvfb \
                wget unzip p7zip
              rpm -i release-artifacts/rpm-package/ibus-handwrite-chinese-*.rpm
              ;;
            opensuse/*)
              zypper install -y python3-evdev python3-gobject ibus \
                typelib-1_0-Gtk-3_0 typelib-1_0-IBus-1_0 \
                xvfb-run wget unzip p7zip
              zypper install -y zinnia || echo "zinnia not available, skipping GTK test"
              if ! python3 -c "import ctypes; ctypes.CDLL('libzinnia.so.0')" 2>/dev/null; then
                echo "available=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              rpm -i release-artifacts/rpm-package/ibus-handwrite-chinese-*.rpm
              ;;
            archlinux:*)
              pacman -S --noconfirm python-evdev python-gobject gtk3 ibus \
                xorg-server-xvfb wget unzip p7zip
              su builder -c "yay -S --noconfirm zinnia"
              tmpdir="$(mktemp -d)"
              tar -xzf release-artifacts/source-tarball/ibus-handwrite-chinese-*.tar.gz -C "$tmpdir"
              (cd "$tmpdir" && ./tools/install.sh --skip-deps --no-restart)
              ;;
          esac
          echo "available=true" >> "$GITHUB_OUTPUT"
        id: install
      - name: Check libzinnia availability
        if: steps.install.outputs.available != 'false'
        id: check_zinnia
        run: |
          python3 -c "import ctypes; ctypes.CDLL('libzinnia.so.0')" && \
            echo "available=true" >> "$GITHUB_OUTPUT" || \
            echo "available=false" >> "$GITHUB_OUTPUT"
      - name: Start Xvfb
        if: steps.check_zinnia.outputs.available == 'true'
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
      - name: Run GTK write test
        if: steps.check_zinnia.outputs.available == 'true'
        run: IBUS_HANDWRITE_ENGINE=/usr/local/bin/ibus-engine-handwrite-chinese python3 tests/test_gtk_write_phrase.py
      - name: Set artifact name
        run: |
          printf 'RELEASE_TEST_ARTIFACT_NAME=%s\n' "release-package-test-${{ matrix.distro }}" | tr ':/' '-' >> "$GITHUB_ENV"
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_TEST_ARTIFACT_NAME }}
          path: tests/screenshots/
          if-no-files-found: warn

  upload-release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [release, verify-release-artifacts, test-packages]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: release-artifacts/*
